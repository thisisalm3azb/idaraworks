# IdaraWorks CI (S0 checklist §8 — Phase A skeleton).
# The integration stage (local Supabase, migration harness, bleed/matrix suites)
# is added in Phase B. Red = no merge (BUILD_BIBLE §14.4).
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # VC-5 target is ≤12 min; hard stop at 15
    env:
      # Placeholder auth env so build + e2e smoke boot. The URL is unreachable,
      # so getUser() returns null (unauthenticated) — exactly what the smoke
      # exercises. No DB env here: /api/health returns 503, which the test accepts.
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:1
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks scans history on PRs

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint (boundaries, tenancy tripwires, banned nouns)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Dependency audit (high+)
        run: pnpm audit --prod --audit-level high

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E smoke
        run: pnpm test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Phase B integration stage (S0 checklist §8 step 5): local Supabase stack with the
  # Supavisor pooler in TRANSACTION mode — the same mechanism as hosted. Sequence
  # mirrors the hosted procedure exactly: VC-1 spike (0000 only) BEFORE real tables.
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_DB_PASSWORD: ci-app-password
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - uses: supabase/setup-cli@v1
        with:
          # Pinned to the repo's `supabase` devDependency version — bump deliberately.
          version: 2.109.1

      - name: Start local Supabase (db + transaction pooler; CLI auto-migrate disabled)
        run: supabase start

      - name: Export connection env from the local stack
        run: |
          set -a
          source <(supabase status -o env)
          set +a
          : "${DB_URL:?supabase status did not emit DB_URL}"
          echo "DIRECT_URL=$DB_URL" >> "$GITHUB_ENV"
          # Review M2: `supabase status` emits NO pooler URL. Construct it from
          # config.toml's [db.pooler] port; the local Supavisor tenant id is
          # `pooler-dev` (username postgres.pooler-dev — env.ts preserves the
          # tenant suffix when swapping in app_user). The probe step below fails
          # loudly if this ever changes.
          echo "DATABASE_URL=postgresql://postgres.pooler-dev:postgres@127.0.0.1:54329/postgres" >> "$GITHUB_ENV"
          # Phase E (storage): the files suite needs the API + auth-admin + the
          # local stack's S3-protocol credentials (the worker's storage client).
          : "${API_URL:?supabase status did not emit API_URL}"
          : "${ANON_KEY:?supabase status did not emit ANON_KEY}"
          : "${SERVICE_ROLE_KEY:?supabase status did not emit SERVICE_ROLE_KEY}"
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> "$GITHUB_ENV"
          # S3 creds: newer CLIs export them from `status`; fall back to the
          # CLI's documented fixed local-dev values. A drift fails loudly in the
          # files suite (S3 auth error), never silently.
          echo "STORAGE_S3_ACCESS_KEY_ID=${S3_PROTOCOL_ACCESS_KEY_ID:-625729a08b95bf1b7ff351a663f3a23c}" >> "$GITHUB_ENV"
          echo "STORAGE_S3_SECRET_ACCESS_KEY=${S3_PROTOCOL_ACCESS_KEY_SECRET:-850181e4652dd023b7a98c58ae0d2d34bd487ee0cc3254aed6eda37307425907}" >> "$GITHUB_ENV"
          echo "STORAGE_S3_ENDPOINT=$API_URL/storage/v1/s3" >> "$GITHUB_ENV"
          echo "STORAGE_S3_REGION=${S3_PROTOCOL_REGION:-local}" >> "$GITHUB_ENV"

      - name: Probe direct + pooler connectivity (fail fast, before VC-1)
        run: pnpm tsx tooling/scripts/probe-db.ts

      - name: VC-1 mechanism spike (0000 only — before any real table)
        run: pnpm vc1

      - name: Apply all migrations
        run: pnpm db:migrate

      - name: Integration tests (tenancy + identity + entitlements + audit + files/storage + events + bleed)
        run: pnpm test:integration
